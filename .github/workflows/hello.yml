name: Hello Workflow

# runs on an automatic trigger, whenever change is pushed to branch (deployment)
on: 
  push:
    branches: [main]
    
    paths:
      - '**.html'

# it's run manually
# on:
#   workflow_dispatch: 

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Say Hello
        run: echo "Hello from GitHub Actions!"

      - name: Print Date and Time
        run: date

      - name: Print Branch Name
        run: echo "Branch is ${{ github.ref_name }}"

      - name: List Files
        run: ls -la

      - name: Print Runner OS
        run: echo "Runner OS is $RUNNER_OS"
        
      - name: say hello users
        run: echo "Hello Dosto."

      - name: say hello username
        run: echo "Hello $USER."

      - name: Break Pipeline
        run: exit 1

  details:
    runs-on: ubuntu-latest
    steps:
      - name: version docker and python 
        run: docker --version && python --version




